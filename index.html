<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Голосовой помощник</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-size: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      font-size: 22px;
      color: #333;
      line-height: 1.6;
    }

    .chat-box {
      background: #ffffff;
      border-radius: 15px;
      padding: 20px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      border: 3px solid #ccc;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 10px;
      word-wrap: break-word;
      font-size: 18px;
      line-height: 1.8;
    }

    .message.user {
      background: #667eea;
      color: white;
      margin-left: 20px;
      text-align: right;
    }

    .message.assistant {
      background: #e8f0ff;
      color: #1a1a1a;
      margin-right: 20px;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: nowrap;
    }

    button {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      padding: 15px;
    }

    .btn-speak {
      background: #22c55e;
      color: white;
      font-size: 22px;
      min-height: 120px;
      flex: 1 1 100%;
      margin-bottom: 15px;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
    }

    .btn-speak:hover {
      background: #16a34a;
      transform: scale(1.02);
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.5);
    }

    .btn-speak.listening {
      background: #ff6b6b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .btn-small {
      background: #9ca3af;
      color: white;
      font-size: 14px;
      flex: 1;
      min-height: 50px;
      padding: 10px;
    }

    .btn-small:hover {
      background: #6b7280;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      font-size: 14px;
      min-height: 50px;
      padding: 10px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .status {
      text-align: center;
      font-size: 20px;
      color: #333;
      margin-bottom: 15px;
      min-height: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status.listening {
      color: #667eea;
    }

    .warning-box {
      display: none;
      background: #fee;
      border: 2px solid #f66;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .warning-box h3 {
      font-size: 20px;
      color: #c33;
      margin-bottom: 10px;
    }

    .warning-box p {
      font-size: 16px;
      color: #555;
      margin-bottom: 10px;
    }

    #phoneNumbers {
      padding: 10px;
      border-radius: 5px;
      font-weight: 600;
      color: #c33;
      font-size: 18px;
      text-align: center;
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 10px;
    }

    .speed-control label {
      font-size: 18px;
      color: #333;
      white-space: nowrap;
      font-weight: 600;
    }

    .speed-control input {
      flex: 1;
      cursor: pointer;
      min-height: 12px;
    }

    .speed-value {
      font-size: 22px;
      color: #667eea;
      font-weight: 700;
      min-width: 30px;
    }

    #authScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-box {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .auth-box h2 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .auth-box p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    .auth-input {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border: 3px solid #ccc;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
    }

    .auth-input:focus {
      border-color: #667eea;
    }

    .auth-btn {
      width: 100%;
      padding: 18px;
      font-size: 20px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .auth-btn:hover {
      background: #16a34a;
    }

    .auth-error {
      color: #ef4444;
      font-size: 16px;
      margin-top: 15px;
      min-height: 20px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      .chat-box {
        height: 250px;
      }
      .btn-speak {
        min-height: 80px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="authScreen" style="display:none;">
    <div class="auth-box">
      <h2>🎤 Голосовой помощник</h2>
      <p>Введите пароль для входа</p>
      <input type="password" id="authInput" class="auth-input" placeholder="••••••••" maxlength="20">
      <button class="auth-btn" id="authBtn">Войти</button>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>

  <div class="container" id="appContainer" style="display:none;">
    <div class="header">
      <h1>🎤 Голосовой помощник</h1>
      <p>Просто говори, я слушаю</p>
    </div>

    <div class="warning-box" id="warningBox">
      <h3>⚠️ Мне кажется, тебе нужна помощь</h3>
      <p>Если ты переживаешь трудные времена, позвони специалистам:</p>
      <div id="phoneNumbers"></div>
    </div>

    <div class="status" id="status">📍 Готов к разговору</div>

    <div class="speed-control">
      <label for="speedSlider">⚡ Скорость речи:</label>
      <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="0.9">
      <span class="speed-value" id="speedValue">0.9x</span>
    </div>

    <div class="chat-box" id="chatBox"></div>
    <button class="btn-speak" id="speakBtn">🎤 ГОВОРИ</button>

    <div class="controls">
      <button class="btn-small" id="clearBtn">🗑️ Очистить чат</button>
      <button class="btn-danger" id="stopBtn">⏹️ Стоп</button>
    </div>
  </div>

  <script>
    const APP_PASSWORD = 'voice2024';

    function checkAuth() {
      const saved = localStorage.getItem('voice_auth');
      if (saved === APP_PASSWORD) {
        showApp();
      } else {
        document.getElementById('authScreen').style.display = 'flex';
      }
    }

    function showApp() {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
      initApp();
    }

    document.getElementById('authBtn').addEventListener('click', () => {
      const input = document.getElementById('authInput').value.trim();
      if (input === APP_PASSWORD) {
        localStorage.setItem('voice_auth', APP_PASSWORD);
        showApp();
      } else {
        document.getElementById('authError').textContent = '❌ Неверный пароль';
        document.getElementById('authInput').value = '';
      }
    });

    document.getElementById('authInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('authBtn').click();
    });

    const DANGER_KEYWORDS = ['хочу умереть', 'убить себя', 'повеситься', 'покончить', 'суицид', 'самоубийство', 'режу', 'травлю себя', 'никому не нужен', 'лучше умереть', 'нет смысла жить'];
    const STOP_KEYWORDS = ['пока', 'конец', 'спасибо', 'хватит', 'всё'];
    const HOTLINES = { 'Россия': '8-800-555-00-50', 'Израиль': '1201' };

    let recognition;
    let conversationHistory = [];
    let isListening = false;
    let audioContext;

    const chatBox = document.getElementById('chatBox');
    const speakBtn = document.getElementById('speakBtn');
    const clearBtn = document.getElementById('clearBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const warningBox = document.getElementById('warningBox');
    const phoneNumbers = document.getElementById('phoneNumbers');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');

    function initApp() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        status.textContent = '❌ Браузер не поддерживает распознавание речи';
        speakBtn.disabled = true;
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = 'ru-RU';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onstart = () => {
        isListening = true;
        speakBtn.classList.add('listening');
        speakBtn.textContent = '🎤 СЛУШАЮ...';
        status.textContent = 'Говори...';
        status.classList.add('listening');
      };

      recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
          }
        }
        if (finalTranscript.trim()) {
          handleUserInput(finalTranscript.trim());
        }
      };

      recognition.onerror = (event) => {
        status.textContent = '❌ Ошибка микрофона: ' + event.error;
      };

      speakBtn.addEventListener('click', () => {
        // Инициализируем Web Audio API от клика (требуется для iOS Safari)
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        audioContext.resume().catch(e => console.log('Audio resume error:', e));
        
        if (!isListening) {
          recognition.start();
        }
      });

      clearBtn.addEventListener('click', () => {
        chatBox.innerHTML = '';
        conversationHistory = [];
        status.textContent = '📍 Готов к разговору';
      });

      stopBtn.addEventListener('click', () => {
        recognition.stop();
        isListening = false;
        speakBtn.classList.remove('listening');
        speakBtn.textContent = '🎤 ГОВОРИ';
      });

      speedSlider.addEventListener('input', (e) => {
        speedValue.textContent = e.target.value + 'x';
      });

      Object.entries(HOTLINES).forEach(([country, number]) => {
        const div = document.createElement('div');
        div.textContent = `${country}: ${number}`;
        phoneNumbers.appendChild(div);
      });
    }

    function checkDangerContent(text) {
      return DANGER_KEYWORDS.some(keyword => text.toLowerCase().includes(keyword));
    }

    function checkStopWords(text) {
      return STOP_KEYWORDS.some(word => text.toLowerCase().includes(word));
    }

    async function handleUserInput(userText) {
      if (!userText) return;
      recognition.stop();
      isListening = false;
      speakBtn.classList.remove('listening');
      speakBtn.textContent = '🎤 ГОВОРИ';
      addMessageToChat(userText, 'user');

      if (checkDangerContent(userText)) {
        warningBox.style.display = 'block';
        return;
      }

      if (checkStopWords(userText)) {
        const goodbyeText = 'До свидания! Было приятно с тобой поговорить. Берегись!';
        addMessageToChat(goodbyeText, 'assistant');
        await speakText(goodbyeText);
        return;
      }

      try {
        status.textContent = 'Думаю...';
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: userText, conversationHistory })
        });

        if (!response.ok) throw new Error('Network error');
        const data = await response.json();
        const assistantText = data.message;

        conversationHistory.push({ role: 'user', content: userText });
        conversationHistory.push({ role: 'assistant', content: assistantText });

        addMessageToChat(assistantText, 'assistant');
        status.textContent = 'Говорю...';
        await speakText(assistantText);
        status.textContent = '📍 Готов к разговору';

      } catch (error) {
        console.error('Error:', error);
        status.textContent = '❌ Ошибка подключения';
        await speakText('Извини, у меня проблема с интернетом. Попробуй снова.');
      }
    }

    function addMessageToChat(text, role) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      messageEl.textContent = text;
      chatBox.appendChild(messageEl);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function speakText(text) {
      return new Promise((resolve) => {
        // Убедимся что audioContext активирован
        if (audioContext) {
          audioContext.resume();
        }
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = parseFloat(speedSlider.value);
        utterance.onend = resolve;
        utterance.onerror = () => {
          console.error('Speech synthesis error');
          resolve();
        };
        window.speechSynthesis.speak(utterance);
      });
    }

    checkAuth();
  </script>
</body>
</html>
