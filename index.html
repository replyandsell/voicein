<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Голосовой компаньон Claude</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      color: #666;
    }

    .chat-box {
      background: #f5f5f5;
      border-radius: 15px;
      padding: 20px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      border: 2px solid #e0e0e0;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 10px;
      word-wrap: break-word;
      font-size: 16px;
      line-height: 1.4;
    }

    .message.user {
      background: #667eea;
      color: white;
      margin-left: 20px;
      text-align: right;
    }

    .message.assistant {
      background: #e8e8e8;
      color: #333;
      margin-right: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-height: 60px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      padding: 15px;
    }

    .btn-speak {
      background: #667eea;
      color: white;
      font-size: 18px;
      min-height: 80px;
      flex: 1 1 100%;
    }

    .btn-speak:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-speak.listening {
      background: #ff6b6b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .btn-small {
      background: #764ba2;
      color: white;
      font-size: 14px;
      flex: 1;
      min-height: 50px;
    }

    .btn-small:hover {
      background: #654391;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
    }

    .btn-danger:hover {
      background: #ff5252;
    }

    .status {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
      min-height: 20px;
    }

    .status.listening {
      color: #667eea;
      font-weight: 600;
    }

    .status.error {
      color: #ff6b6b;
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 10px;
    }

    .speed-control label {
      font-size: 14px;
      color: #666;
      white-space: nowrap;
    }

    .speed-control input {
      flex: 1;
      cursor: pointer;
    }

    .speed-value {
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
      min-width: 30px;
    }

    .warning-box {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      display: none;
    }

    .warning-box.show {
      display: block;
    }

    .warning-box h3 {
      color: #856404;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .warning-box p {
      color: #856404;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .warning-box .phone {
      background: white;
      padding: 10px;
      border-radius: 5px;
      font-weight: 600;
      color: #ff6b6b;
      font-size: 18px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .chat-box {
        height: 250px;
      }

      button {
        font-size: 14px;
      }

      .btn-speak {
        min-height: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎤 Голосовой помощник</h1>
      <p>Просто говори, я слушаю</p>
    </div>

    <div class="warning-box" id="warningBox">
      <h3>⚠️ Мне кажется, тебе нужна помощь</h3>
      <p>Если ты переживаешь трудные времена, позвони специалистам:</p>
      <div id="phoneNumbers"></div>
    </div>

    <div class="status" id="status">Готов к разговору</div>

    <div class="speed-control">
      <label for="speedSlider">Скорость речи:</label>
      <input 
        type="range" 
        id="speedSlider" 
        min="0.5" 
        max="1.5" 
        step="0.1" 
        value="0.9"
      >
      <span class="speed-value" id="speedValue">0.9x</span>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <button class="btn-speak" id="speakBtn">🎤 ГОВОРИ</button>

    <div class="controls">
      <button class="btn-small" id="clearBtn">🗑️ Очистить чат</button>
      <button class="btn-danger" id="stopBtn">⏹️ Стоп</button>
    </div>
  </div>

  <script>
    // Опасные слова для фильтра
    const DANGER_KEYWORDS = [
      'хочу умереть', 'убить себя', 'повеситься', 'покончить', 
      'суицид', 'самоубийство', 'режу', 'травлю себя',
      'никому не нужен', 'лучше умереть', 'нет смысла жить',
      'не хочу жить'
    ];

    const STOP_KEYWORDS = ['пока', 'конец', 'спасибо', 'хватит', 'всё'];

    // Горячие линии
    const HOTLINES = {
      'Россия': '8-800-555-00-50',
      'Израиль': '1201'
    };

    // Переменные
    let recognition;
    let conversationHistory = [];
    let isListening = false;
    let isSpeaking = false;
    let silenceTimeout;
    let finalTranscript = '';
    let microphoneActive = false;
    let lastSpeechTime = Date.now();

    const chatBox = document.getElementById('chatBox');
    const speakBtn = document.getElementById('speakBtn');
    const clearBtn = document.getElementById('clearBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const warningBox = document.getElementById('warningBox');
    const phoneNumbers = document.getElementById('phoneNumbers');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');

    // Инициализация Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
      status.textContent = '❌ Браузер не поддерживает распознавание речи';
      speakBtn.disabled = true;
    } else {
      recognition = new SpeechRecognition();
      recognition.lang = 'ru-RU';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onstart = () => {
        isListening = true;
        microphoneActive = true;
        speakBtn.classList.add('listening');
        speakBtn.textContent = '🎤 СЛУШАЮ...';
        status.textContent = 'Говори...';
        status.classList.add('listening');
        lastSpeechTime = Date.now();
      };

      recognition.onresult = (event) => {
        finalTranscript = '';
        
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
            lastSpeechTime = Date.now();
          }
        }

        if (finalTranscript.trim()) {
          // Очищаем предыдущий таймаут
          clearTimeout(silenceTimeout);
          
          // Устанавливаем новый таймаут на конец фразы (3 сек паузы)
          silenceTimeout = setTimeout(() => {
            if (finalTranscript.trim()) {
              handleUserMessage(finalTranscript.trim());
              finalTranscript = '';
            }
          }, 3000);
        }
      };

      recognition.onerror = (event) => {
        status.textContent = '❌ Ошибка: ' + event.error;
        status.classList.add('error');
      };

      recognition.onend = () => {
        isListening = false;
        microphoneActive = false;
        speakBtn.classList.remove('listening');
        speakBtn.textContent = '🎤 ГОВОРИ';
      };
    }

    // Обновление скорости речи
    speedSlider.addEventListener('change', (e) => {
      speedValue.textContent = e.target.value + 'x';
    });

    // Кнопка говори
    speakBtn.addEventListener('click', () => {
      if (!recognition) return;
      
      if (microphoneActive) {
        // Уже слушаем
        recognition.stop();
        clearTimeout(silenceTimeout);
      } else {
        // Запускаем слушание
        chatBox.innerHTML = '';
        conversationHistory = [];
        warningBox.classList.remove('show');
        recognition.start();
      }
    });

    // Кнопка стоп
    stopBtn.addEventListener('click', () => {
      if (recognition && microphoneActive) {
        recognition.stop();
        clearTimeout(silenceTimeout);
      }
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
      }
    });

    // Кнопка очистить
    clearBtn.addEventListener('click', () => {
      chatBox.innerHTML = '';
      conversationHistory = [];
      warningBox.classList.remove('show');
      status.textContent = 'Готов к разговору';
      status.classList.remove('listening', 'error');
    });

    // Проверка на опасный контент
    function checkDangerContent(text) {
      const lowerText = text.toLowerCase();
      return DANGER_KEYWORDS.some(keyword => lowerText.includes(keyword));
    }

    // Проверка на стоп-слова
    function checkStopWords(text) {
      const lowerText = text.toLowerCase();
      return STOP_KEYWORDS.some(keyword => lowerText.includes(keyword));
    }

    // Синтез речи
    function speakText(text) {
      return new Promise((resolve) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = parseFloat(speedSlider.value);
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        utterance.onend = () => {
          isSpeaking = false;
          resolve();
          // После ответа снова слушаем
          if (recognition && !checkStopWords(conversationHistory[conversationHistory.length - 1]?.content || '')) {
            recognition.start();
          }
        };

        utterance.onerror = () => {
          isSpeaking = false;
          resolve();
        };

        isSpeaking = true;
        window.speechSynthesis.speak(utterance);
      });
    }

    // Показать сообщение опасности
    function showWarningMessage() {
      warningBox.classList.add('show');
      phoneNumbers.innerHTML = Object.entries(HOTLINES)
        .map(([country, phone]) => `<div class="phone">${country}: ${phone}</div>`)
        .join('');
      
      const warningText = `Мне кажется, тебе нужна помощь. Пожалуйста, позвони специалистам. ${Object.values(HOTLINES).join(' или ')}.`;
      speakText(warningText);
    }

    // Обработка сообщения пользователя
    async function handleUserMessage(userText) {
      // Добавляем сообщение пользователя
      conversationHistory.push({
        role: 'user',
        content: userText
      });

      addMessageToChat(userText, 'user');
      status.textContent = 'Думаю...';

      // Проверяем на опасный контент
      if (checkDangerContent(userText)) {
        showWarningMessage();
        return;
      }

      // Проверяем на стоп-слова
      if (checkStopWords(userText)) {
        const goodbyeText = 'До свидания! Было приятно с тобой поговорить. Берегись!';
        addMessageToChat(goodbyeText, 'assistant');
        await speakText(goodbyeText);
        recognition.stop();
        return;
      }

      try {
        // Отправляем запрос на сервер
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: userText,
            conversationHistory: conversationHistory
          })
        });

        if (!response.ok) {
          throw new Error('Network response was not ok');
        }

        const data = await response.json();
        const assistantText = data.message;

        // Добавляем ответ ассистента
        conversationHistory.push({
          role: 'assistant',
          content: assistantText
        });

        addMessageToChat(assistantText, 'assistant');
        status.textContent = 'Говорю...';

        // Проговариваем ответ
        await speakText(assistantText);
        status.textContent = 'Готов к разговору';

      } catch (error) {
        console.error('Error:', error);
        status.textContent = '❌ Ошибка подключения';
        status.classList.add('error');
        const errorText = 'Извини, у меня проблема с интернетом. Попробуй снова.';
        await speakText(errorText);
      }
    }

    // Добавить сообщение в чат
    function addMessageToChat(text, role) {
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      messageEl.textContent = text;
      chatBox.appendChild(messageEl);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
